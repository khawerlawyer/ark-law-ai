<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#0D1B2A" stroke="#C9A84C" stroke-width="2"/>
  
  <!-- Pakistan Green Arc at top -->
  <path d="M 50 60 A 50 50 0 0 1 150 60" fill="none" stroke="#3EB489" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Scales of Justice - Left Balance -->
  <line x1="70" y1="85" x2="50" y2="85" stroke="#C9A84C" stroke-width="2"/>
  <rect x="40" y="85" width="16" height="30" fill="#C9A84C" stroke="#C9A84C" stroke-width="1" rx="2"/>
  
  <!-- Scales of Justice - Center Beam -->
  <rect x="95" y="80" width="10" height="35" fill="#C9A84C" stroke="#C9A84C" stroke-width="1" rx="2"/>
  
  <!-- Scales of Justice - Right Balance -->
  <line x1="130" y1="85" x2="150" y2="85" stroke="#C9A84C" stroke-width="2"/>
  <rect x="144" y="85" width="16" height="30" fill="#C9A84C" stroke="#C9A84C" stroke-width="1" rx="2"/>
  
  <!-- AI Circuit Pattern - Left side -->
  <circle cx="65" cy="120" r="4" fill="#C9A84C"/>
  <circle cx="65" cy="140" r="4" fill="#C9A84C"/>
  <line x1="65" y1="124" x2="65" y2="136" stroke="#C9A84C" stroke-width="1.5"/>
  
  <!-- AI Circuit Pattern - Right side -->
  <circle cx="135" cy="120" r="4" fill="#C9A84C"/>
  <circle cx="135" cy="140" r="4" fill="#C9A84C"/>
  <line x1="135" y1="124" x2="135" y2="136" stroke="#C9A84C" stroke-width="1.5"/>
  
  <!-- Center AI Node -->
  <circle cx="100" cy="130" r="6" fill="#3EB489" stroke="#C9A84C" stroke-width="1.5"/>
  
  <!-- Connection lines from AI to scales -->
  <line x1="75" y1="120" x2="100" y2="124" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
  <line x1="125" y1="120" x2="100" y2="124" stroke="#C9A84C" stroke-width="1" opacity="0.7"/>
  
  <!-- Pakistani Crescent symbol at bottom -->
  <path d="M 85 155 Q 100 150 115 155" fill="none" stroke="#3EB489" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Star for Pakistan -->
  <g transform="translate(100, 160)">
    <polygon points="0,-5 1.5,-1.5 5,-1.5 2.5,1.5 3.5,5 0,2.5 -3.5,5 -2.5,1.5 -5,-1.5 -1.5,-1.5" fill="#3EB489"/>
  </g>
  
  <!-- Outer decorative elements -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
</svg>
