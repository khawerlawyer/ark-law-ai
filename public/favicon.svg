<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield Background -->
  <path d="M 100 20 L 160 50 L 160 110 C 160 150 100 180 100 180 C 100 180 40 150 40 110 L 40 50 Z" fill="#0D1B2A" stroke="#C9A84C" stroke-width="2"/>
  
  <!-- Left half - Pakistan Green -->
  <path d="M 100 20 L 130 50 L 130 110 C 130 140 100 170 100 170 C 100 170 70 140 70 110 L 70 50 Z" fill="#3EB489" opacity="0.3"/>
  
  <!-- Right half - Light blue background -->
  <path d="M 100 20 L 170 50 L 170 110 C 170 150 100 180 100 180 C 100 180 130 150 130 110 L 130 50 Z" fill="#5B8DD9" opacity="0.2"/>
  
  <!-- Pakistan Crescent and Star (Left side) -->
  <g transform="translate(70, 80)">
    <!-- Crescent -->
    <path d="M -8 0 Q -4 -8 4 -4 Q 0 4 -8 0" fill="#C9A84C"/>
    <!-- Star -->
    <polygon points="12,-3 14,-9 20,-9 15,-13 17,-19 12,-15 7,-19 9,-13 4,-9 10,-9" fill="#C9A84C"/>
  </g>
  
  <!-- Center Scales of Justice -->
  <g transform="translate(100, 95)">
    <!-- Left balance -->
    <line x1="-15" y1="-5" x2="-25" y2="-5" stroke="#C9A84C" stroke-width="2"/>
    <rect x="-30" y="-5" width="8" height="15" fill="#C9A84C" rx="1"/>
    
    <!-- Center beam -->
    <rect x="-2" y="-10" width="4" height="20" fill="#C9A84C" rx="1"/>
    
    <!-- Right balance -->
    <line x1="15" y1="-5" x2="25" y2="-5" stroke="#C9A84C" stroke-width="2"/>
    <rect x="22" y="-5" width="8" height="15" fill="#C9A84C" rx="1"/>
  </g>
  
  <!-- USA Stars (Right side) -->
  <g transform="translate(130, 70)">
    <polygon points="0,-4 1.2,-1.2 4,-1.2 2,1 3,3.8 0,1.8 -3,3.8 -2,1 -4,-1.2 -1.2,-1.2" fill="#C9A84C"/>
    <polygon points="8,-2 8.8,0 11.5,0 9.5,1.5 10.3,3.5 8,2 5.7,3.5 6.5,1.5 4.5,0 7.2,0" fill="#C9A84C"/>
    <polygon points="4,6 4.8,8 7.5,8 5.5,9.5 6.3,11.5 4,10 1.7,11.5 2.5,9.5 0.5,8 3.2,8" fill="#C9A84C"/>
  </g>
  
  <!-- Shield Border -->
  <path d="M 100 20 L 160 50 L 160 110 C 160 150 100 180 100 180 C 100 180 40 150 40 110 L 40 50 Z" fill="none" stroke="#C9A84C" stroke-width="2"/>
</svg>
